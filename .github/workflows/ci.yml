name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore FcDraft.sln

      - name: Build
        run: dotnet build FcDraft.sln -c Release --no-restore

      - name: Test
        run: dotnet test FcDraft.sln -c Release --no-build --verbosity normal

  frontend:
    name: Frontend build and component tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fc-draft-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: fc-draft-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Component tests (Vitest)
        run: npm run test:run

      - name: Production build
        run: npm run build

  e2e:
    name: PWA smoke tests (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: fc-draft-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: fc-draft-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Run smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: fc-draft-web/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
