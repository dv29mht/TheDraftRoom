<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 132" role="img" aria-labelledby="title description">
  <title id="title">The Draft Room</title>
  <desc id="description">The Draft Room athletic wordmark with its floodlit doorway monogram.</desc>
  <defs>
    <linearGradient id="silver" x1="135" y1="26" x2="420" y2="74" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset=".5" stop-color="#D9DCE2"/>
      <stop offset="1" stop-color="#8B909B"/>
    </linearGradient>
    <linearGradient id="pink" x1="145" y1="72" x2="420" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF3B99"/>
      <stop offset=".55" stop-color="#FF006E"/>
      <stop offset="1" stop-color="#B80053"/>
    </linearGradient>
    <linearGradient id="rim" x1="10" y1="8" x2="118" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4BA7"/><stop offset=".52" stop-color="#FF006E"/><stop offset="1" stop-color="#7820FF"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

