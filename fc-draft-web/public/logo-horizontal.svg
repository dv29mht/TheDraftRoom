  <path d="M64 15 105 34v54l-41 26-41-26V34L64 15Z" fill="none" stroke="#FF2095" stroke-opacity=".45" stroke-width="2"/>
  <path d="M39 88V37l25-13 25 13v51M50 82V43l14-8 14 8v39" fill="none" stroke="#FF2095" stroke-opacity=".36" stroke-width="2"/>
  <path fill="url(#silver)" fill-rule="evenodd" d="M28 40h34c14 0 22 7 22 19 0 15-10 25-29 25H22l6-44Zm14 11-4 22h17c8 0 12-5 12-12 0-7-4-10-11-10H42Z"/>
  <path fill="url(#pink)" fill-rule="evenodd" d="M62 65h29c12 0 18 5 18 14 0 7-4 12-11 15l8 18H90l-7-15h-7l-3 15H58l4-21 14-7h13c3 0 5-2 5-5 0-2-2-3-5-3H60l2-11Z"/>
  <path d="m29 99 81-42" stroke="#08090D" stroke-width="7"/><path d="m29 96 81-42" stroke="url(#rim)" stroke-width="2" filter="url(#glow)"/>

  <g transform="skewX(-8)">
