<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 128 128" role="img" aria-labelledby="title description">
  <title id="title">The Draft Room monogram</title>
  <desc id="description">A silver D and neon pink R inside a floodlit doorway shield.</desc>
  <defs>
    <linearGradient id="bg" x1="12" y1="8" x2="116" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B1E24"/>
      <stop offset="1" stop-color="#06070B"/>
    </linearGradient>
    <linearGradient id="silver" x1="30" y1="28" x2="71" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset=".48" stop-color="#D9DCE2"/>
      <stop offset="1" stop-color="#858B96"/>
    </linearGradient>
    <linearGradient id="pink" x1="57" y1="55" x2="98" y2="101" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF3B99"/>
      <stop offset=".5" stop-color="#FF006E"/>
      <stop offset="1" stop-color="#B80053"/>
    </linearGradient>
    <linearGradient id="rim" x1="18" y1="10" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4BA7"/>
      <stop offset=".52" stop-color="#FF006E"/>
      <stop offset="1" stop-color="#7820FF"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <rect x="6" y="6" width="116" height="116" rx="26" fill="none" stroke="url(#rim)" stroke-width="3" filter="url(#glow)"/>

  <!-- Doorway/shield geometry from the approved moodboard direction. -->
  <path d="M64 13 105 33v55L64 115 23 88V33L64 13Z" fill="none" stroke="#FF006E" stroke-opacity=".24" stroke-width="2"/>
  <path d="M64 21 96 37v45L64 103 32 82V37L64 21Z" fill="none" stroke="#FF2095" stroke-opacity=".36" stroke-width="2"/>
  <path d="M43 83V39l21-11 21 11v44" fill="none" stroke="#FF2095" stroke-opacity=".44" stroke-width="2"/>
  <path d="M53 79V44l11-6 11 6v35" fill="none" stroke="#FF2095" stroke-opacity=".27"/>

  <!-- Compact DR mark; the diagonal cut stays recognizable at favicon size. -->
  <path fill="url(#silver)" fill-rule="evenodd" d="M26 31h33c13 0 21 7 21 19 0 15-10 25-28 25H20l6-44Zm14 11-4 22h16c8 0 12-5 12-12 0-7-4-10-11-10H40Z"/>
  <path fill="url(#pink)" fill-rule="evenodd" d="M61 55h28c12 0 18 5 18 14 0 7-4 12-11 15l8 17H88L82 87h-7l-3 14H57l4-20 13-7h13c3 0 5-2 5-5 0-2-2-3-5-3H59l2-11Z"/>
  <path d="m28 89 76-39" stroke="#07080C" stroke-width="7"/>
  <path d="m28 86 76-39" stroke="url(#rim)" stroke-width="2" filter="url(#glow)"/>
</svg>
